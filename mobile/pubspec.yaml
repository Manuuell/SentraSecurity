name: sentra_gps
description: Plataforma GPS para motos - SentraSecurity, Cartagena
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP con JWT hacia la API propia
  dio: ^5.4.3

  # Almacenamiento seguro de tokens (Keychain/Keystore)
  flutter_secure_storage: ^9.2.2

  # WebSocket tiempo real
  web_socket_channel: ^2.4.5

  # Mapa (OpenStreetMap, sin API key)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # State management
  provider: ^6.1.2

  # Preferencias locales de UI
  shared_preferences: ^2.3.2

  # Notificaciones locales
  flutter_local_notifications: ^17.2.3

  # Utilidades
  intl: ^0.19.0
  timeago: ^3.6.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
