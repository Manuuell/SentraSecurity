# Stack propio de SentraSecurity (ADR-1/ADR-2 del plan):
# PostgreSQL + API FastAPI con ingest TCP integrado (monolito, suficiente
# hasta ~300 motos; la separación api/ingest llega con LISTEN/NOTIFY).
#
# Secretos SIEMPRE en .env (ver .env.example) — nunca en este archivo.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentra_gps}
      POSTGRES_USER: ${POSTGRES_USER:-sentra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD en .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentra} -d ${POSTGRES_DB:-sentra_gps}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sentra}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sentra_gps}
      SECRET_KEY: ${SECRET_KEY:?Definir SECRET_KEY en .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TZ: America/Bogota
    ports:
      - "8000:8000"   # API REST + WebSocket (en prod va detrás de Caddy/HTTPS)
      - "8090:8090"   # Ingest TCP de los ST-907L
      # El puerto 5013 (legado de Traccar) ya está abierto en la Security List
      # de Oracle: mapearlo también evita abrir otro puerto en la consola
      - "5013:8090"

volumes:
  pg_data:
