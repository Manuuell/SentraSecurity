# Stack de producción de SentraSecurity (ADR-1/ADR-2 del plan):
# PostgreSQL + API FastAPI con ingest TCP integrado. El frontend se sirve
# estático desde el nginx del host; OSRM corre aparte (contenedor sentra-osrm).
#
# Secretos SIEMPRE en .env (ver .env.example) — nunca en este archivo.
# Arranque en el VPS:  docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentra_gps}
      POSTGRES_USER: ${POSTGRES_USER:-sentra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD en .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentra} -d ${POSTGRES_DB:-sentra_gps}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    image: sentra-api:latest
    container_name: sentra-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sentra}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sentra_gps}
      SECRET_KEY: ${SECRET_KEY:?Definir SECRET_KEY en .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://sentrasecurity.duckdns.org}
      TZ: America/Bogota
      # Push (Fase 4 — FCM). Opcional: vacío desactiva el envío sin romper
      # nada más (server/push.py). Cuando exista el archivo en el VPS, montarlo
      # además como volumen de solo lectura apuntando a esta misma ruta.
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    ports:
      - "127.0.0.1:8000:8000"   # API REST + WebSocket (el nginx del host proxya con HTTPS)
      - "5013:8090"             # Ingestión TCP de los ST-907L (puerto abierto en OCI)

volumes:
  pg_data:
