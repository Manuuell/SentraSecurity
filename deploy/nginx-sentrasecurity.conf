# nginx para sentrasecurity.duckdns.org
# Se enlaza en /etc/nginx/sites-enabled/ y certbot añade el bloque TLS.
# Convive con los demás sitios del host; NO tocar los otros server blocks.

server {
    server_name sentrasecurity.duckdns.org;

    # Frontend estático (SPA React): el build lo despliega GitHub Actions.
    root /var/www/sentrasecurity;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API REST + WebSocket
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket (/api/ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;
    }

    # OSRM propio (evita mixed-content: la web HTTPS llama por el mismo dominio)
    location /osrm/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
    }

    listen 80;
    listen [::]:80;
    # certbot reemplaza esto por listen 443 ssl + certificados al correr --nginx
}
